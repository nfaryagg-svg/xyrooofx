<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heyyarya Trader Gold</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #000000;
    --panel: #0a0c12;
    --panel-2: #0e1118;
    --line: #1c2230;
    --blue: #3a8dff;
    --blue-bright: #6fb8ff;
    --blue-dim: #1d4d8a;
    --text: #e8edf5;
    --text-dim: #6f7a8c;
    --red: #d4607a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    overflow-x: hidden;
  }

  /* ===== Lightning canvas background ===== */
  #bgCanvas{
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, #050810 0%, #000000 70%);
  }

  .app{
    position: relative;
    z-index: 2;
    min-height: 100vh;
  }

  /* ===== Shared ===== */
  .hidden{ display:none !important; }
  ::selection{ background: var(--blue-dim); color:#fff; }

  /* ===== Auth screen ===== */
  .auth-screen{
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
  }
  .auth-box{
    width: 100%;
    max-width: 400px;
    background: rgba(10,12,18,0.7);
    border: 1px solid var(--line);
    backdrop-filter: blur(14px);
    padding: 38px 32px;
    box-shadow: 0 0 60px rgba(58,141,255,0.06), inset 0 0 0 1px rgba(58,141,255,0.04);
    position: relative;
  }
  .auth-box::before{
    content:'';
    position:absolute; top:-1px; left:-1px; right:-1px; height:2px;
    background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
    animation: scanline 3s linear infinite;
  }
  @keyframes scanline{
    0%{ transform: translateX(-100%); opacity:0; }
    50%{ opacity:1; }
    100%{ transform: translateX(100%); opacity:0; }
  }

  .auth-logo{
    display:flex; flex-direction:column; align-items:center; gap:10px;
    margin-bottom: 28px;
  }
  .auth-welcome{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blue-bright);
    border: 1px solid var(--blue-dim);
    padding: 7px 16px;
    box-shadow: 0 0 18px rgba(58,141,255,0.2);
    margin-bottom: 4px;
  }
  .auth-logo h1{
    font-family:'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    text-align:center;
  }
  .auth-logo p{
    font-size: 10.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue-dim);
  }

  .auth-tabs{
    display:flex;
    border: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .auth-tab{
    flex:1;
    text-align:center;
    padding: 11px;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-dim);
    cursor:pointer;
    background: transparent;
    border:none;
    font-family: inherit;
    transition: color .2s, background .2s;
  }
  .auth-tab.active{
    color: #000;
    background: var(--blue);
  }

  .field{ margin-bottom: 16px; }
  .field label{
    display:block;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--blue-dim);
    margin-bottom: 7px;
  }
  .field input{
    width:100%;
    background: #05070b;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 13px;
    font-size: 13.5px;
    font-family: inherit;
    outline:none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus{
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(58,141,255,0.12);
  }

  .btn-primary{
    width:100%;
    background: var(--blue);
    color: #000;
    border:none;
    padding: 13px;
    font-weight: 800;
    font-size: 12.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor:pointer;
    transition: background .15s, box-shadow .15s, transform .1s;
    font-family: inherit;
    margin-top: 6px;
  }
  .btn-primary:hover{ background: var(--blue-bright); box-shadow: 0 0 22px rgba(58,141,255,0.4); }
  .btn-primary:active{ transform: scale(0.98); }

  .auth-error{
    margin-top: 12px;
    font-size: 12px;
    color: var(--red);
    text-align:center;
    display:none;
  }
  .auth-error.show{ display:block; }

  .auth-foot{
    margin-top: 18px;
    text-align:center;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ===== Dashboard ===== */
  header.bar{
    border-bottom: 1px solid var(--line);
    padding: 18px 5vw;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    position: sticky;
    top:0;
    z-index: 10;
  }
  .bar-left{ display:flex; align-items:center; gap:12px; }
  .bar-mark{
    width: 34px; height:34px;
    border:1.5px solid var(--blue);
    display:flex; align-items:center; justify-content:center;
    transform: rotate(45deg);
    font-family:'Orbitron', sans-serif; font-weight:800; color:var(--blue-bright); font-size:15px;
  }
  .bar-mark span{ transform: rotate(-45deg); }
  .bar-title{ font-family:'Orbitron', sans-serif; font-size:14px; letter-spacing:1.5px; color:var(--text); }
  .bar-right{ display:flex; align-items:center; gap: 18px; }
  .user-chip{
    display:flex; align-items:center; gap:8px;
    font-size: 12px; color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
  }
  .user-dot{ width:7px; height:7px; border-radius:50%; background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .btn-logout{
    background:none;
    border:1px solid var(--line);
    color: var(--text-dim);
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor:pointer;
    font-family: inherit;
    transition: border-color .2s, color .2s;
  }
  .btn-logout:hover{ border-color: var(--blue); color: var(--blue-bright); }

  .dash{ padding: 36px 5vw 90px; }

  .stat-row{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .stat{
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 18px 20px;
    position: relative;
    overflow:hidden;
  }
  .stat::after{
    content:'';
    position:absolute; left:0; bottom:0; height:2px; width:100%;
    background: linear-gradient(90deg, var(--blue), transparent);
    opacity:.6;
  }
  .stat-label{ font-size: 10.5px; letter-spacing:1.5px; text-transform:uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .stat-value{ font-family:'JetBrains Mono', monospace; font-size: 24px; font-weight:600; color: var(--blue-bright); }
  .stat-sub{ font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .panel-block{
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 26px;
    margin-bottom: 24px;
  }
  .panel-block h3{
    font-family:'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 18px;
    display:flex; align-items:center; gap:10px;
  }
  .panel-block h3::before{ content:''; width:3px; height:14px; background: var(--blue); display:inline-block; }

  .quick-actions{ display:flex; flex-wrap:wrap; gap: 12px; }
  .qa-btn{
    flex: 1 1 160px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 16px;
    cursor:pointer;
    text-align:left;
    font-family: inherit;
    transition: border-color .2s, background .2s;
  }
  .qa-btn:hover{ border-color: var(--blue); background: #0d1422; }
  .qa-btn .qa-icon{ color: var(--blue-bright); font-size: 17px; margin-bottom: 8px; display:block; }
  .qa-btn .qa-label{ font-size: 12.5px; font-weight:700; }
  .qa-btn .qa-desc{ font-size: 10.5px; color: var(--text-dim); margin-top: 3px; }

  .activity-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
    font-size: 12.5px;
  }
  .activity-row:last-child{ border-bottom:none; }
  .activity-left{ display:flex; align-items:center; gap: 10px; color: var(--text); }
  .activity-left .act-dot{ width:6px; height:6px; border-radius:50%; background: var(--blue); }
  .activity-time{ color: var(--text-dim); font-family:'JetBrains Mono', monospace; font-size: 11px; }

  .empty-mini{ color: var(--text-dim); font-size: 12.5px; padding: 18px 0; text-align:center; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-welcome">Selamat datang di website</div>
        <h1>HEYYARYA TRADER GOLD</h1>
        <p>Secure Access</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabRegister">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="loginUser" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPass" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary">Masuk</button>
        <div class="auth-error" id="loginError"></div>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="hidden">
        <div class="field">
          <label>Username</label>
          <input type="text" id="regUser" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPass" required>
        </div>
        <div class="field">
          <label>Konfirmasi Password</label>
          <input type="password" id="regPass2" required>
        </div>
        <button type="submit" class="btn-primary">Daftar Akun</button>
        <div class="auth-error" id="registerError"></div>
      </form>

      <div class="auth-foot" id="authFoot">Belum punya akun? Klik tab Register.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashScreen" class="hidden">
    <header class="bar">
      <div class="bar-left">
        <div class="bar-mark"><span>H</span></div>
        <div class="bar-title">HEYYARYA TRADER GOLD</div>
      </div>
      <div class="bar-right">
        <div class="user-chip"><span class="user-dot"></span><span id="userChipName">user</span></div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </header>

    <div class="dash">
      <div class="stat-row">
        <div class="stat">
          <div class="stat-label">Status Akun</div>
          <div class="stat-value">Aktif</div>
          <div class="stat-sub">Sesi tersimpan di perangkat ini</div>
        </div>
        <div class="stat">
          <div class="stat-label">Login Terakhir</div>
          <div class="stat-value" id="lastLogin">—</div>
          <div class="stat-sub">Waktu lokal</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Unggahan</div>
          <div class="stat-value">0</div>
          <div class="stat-sub">Item di galeri</div>
        </div>
      </div>

      <div class="panel-block">
        <h3>Aksi Cepat</h3>
        <div class="quick-actions">
          <button class="qa-btn">
            <span class="qa-icon">&#9650;</span>
            <span class="qa-label">Unggah Gambar</span>
            <span class="qa-desc">Tambah bukti / catatan baru</span>
          </button>
          <button class="qa-btn">
            <span class="qa-icon">&#9670;</span>
            <span class="qa-label">Galeri Saya</span>
            <span class="qa-desc">Lihat semua unggahan</span>
          </button>
          <button class="qa-btn">
            <span class="qa-icon">&#9881;</span>
            <span class="qa-label">Pengaturan</span>
            <span class="qa-desc">Ubah profil &amp; password</span>
          </button>
        </div>
      </div>

      <div class="panel-block">
        <h3>Aktivitas</h3>
        <div id="activityList">
          <div class="activity-row">
            <div class="activity-left"><span class="act-dot"></span> Akun berhasil masuk</div>
            <div class="activity-time" id="actTime">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  /* ===== Lightning background animation ===== */
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  let bolts = [];

  function createBolt(){
    const startX = Math.random() * w;
    const segments = [];
    let x = startX, y = -20;
    const segCount = 14 + Math.floor(Math.random()*8);
    for(let i=0;i<segCount;i++){
      segments.push({x, y});
      x += (Math.random()-0.5) * 70;
      y += h/segCount;
    }
    segments.push({x, y: h+20});

    // branches
    const branches = [];
    if(Math.random() < 0.7){
      const idx = Math.floor(segCount*0.3) + Math.floor(Math.random()*segCount*0.3);
      const origin = segments[idx];
      if(origin){
        let bx = origin.x, by = origin.y;
        const bseg = [{x:bx, y:by}];
        const bcount = 5 + Math.floor(Math.random()*4);
        for(let j=0;j<bcount;j++){
          bx += (Math.random()-0.3) * 50;
          by += 30 + Math.random()*20;
          bseg.push({x:bx, y:by});
        }
        branches.push(bseg);
      }
    }

    bolts.push({
      segments, branches,
      life: 1,
      decay: 0.04 + Math.random()*0.03,
      width: 1.2 + Math.random()*1.3
    });
  }

  function drawBoltPath(pts, alpha, width, color){
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width;
    ctx.shadowBlur = 18;
    ctx.shadowColor = color;
    ctx.stroke();
  }

  function animate(){
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,w,h);

    if(Math.random() < 0.018 && bolts.length < 3) createBolt();

    bolts.forEach(b => {
      b.life -= b.decay;
      const a = Math.max(b.life, 0);
      drawBoltPath(b.segments, a*0.9, b.width, '#6fb8ff');
      drawBoltPath(b.segments, a*0.4, b.width*3, '#3a8dff');
      b.branches.forEach(br => {
        drawBoltPath(br, a*0.6, b.width*0.7, '#6fb8ff');
      });
    });
    bolts = bolts.filter(b => b.life > 0);

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    requestAnimationFrame(animate);
  }
  animate();

  /* ===== Auth logic (persisted via window.storage) ===== */
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const authFoot = document.getElementById('authFoot');
  const loginError = document.getElementById('loginError');
  const registerError = document.getElementById('registerError');
  const authScreen = document.getElementById('authScreen');
  const dashScreen = document.getElementById('dashScreen');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active'); tabRegister.classList.remove('active');
    loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
    authFoot.textContent = 'Belum punya akun? Klik tab Register.';
    loginError.classList.remove('show'); registerError.classList.remove('show');
  });
  tabRegister.addEventListener('click', () => {
    tabRegister.classList.add('active'); tabLogin.classList.remove('active');
    registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    authFoot.textContent = 'Sudah punya akun? Klik tab Login.';
    loginError.classList.remove('show'); registerError.classList.remove('show');
  });

  function simpleHash(str){
    let h = 0;
    for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
    return h.toString(16);
  }

  async function getUser(username){
    try{
      const res = await window.storage.get('user:' + username, true);
      return res ? JSON.parse(res.value) : null;
    }catch(e){ return null; }
  }
  async function saveUser(username, data){
    await window.storage.set('user:' + username, JSON.stringify(data), true);
  }

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    registerError.classList.remove('show');
    const u = document.getElementById('regUser').value.trim();
    const p = document.getElementById('regPass').value;
    const p2 = document.getElementById('regPass2').value;

    if(u.length < 3){ showErr(registerError, 'Username minimal 3 karakter.'); return; }
    if(p.length < 4){ showErr(registerError, 'Password minimal 4 karakter.'); return; }
    if(p !== p2){ showErr(registerError, 'Konfirmasi password tidak cocok.'); return; }

    const existing = await getUser(u);
    if(existing){ showErr(registerError, 'Username sudah dipakai.'); return; }

    await saveUser(u, { passHash: simpleHash(p), createdAt: Date.now() });
    showErr(registerError, 'Akun dibuat. Silakan login.', true);
    registerForm.reset();
    setTimeout(() => tabLogin.click(), 900);
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.classList.remove('show');
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;

    const user = await getUser(u);
    if(!user || user.passHash !== simpleHash(p)){
      showErr(loginError, 'Username atau password salah.');
      return;
    }
    enterDashboard(u);
  });

  function showErr(el, msg, ok){
    el.textContent = msg;
    el.style.color = ok ? '#5fd6a0' : 'var(--red)';
    el.classList.add('show');
  }

  function enterDashboard(username){
    authScreen.classList.add('hidden');
    dashScreen.classList.remove('hidden');
    document.getElementById('userChipName').textContent = username;
    const now = new Date().toLocaleString('id-ID');
    document.getElementById('lastLogin').textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('actTime').textContent = now;
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    dashScreen.classList.add('hidden');
    authScreen.classList.remove('hidden');
    loginForm.reset();
  });
</script>

</body>
</html>
